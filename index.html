<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My Portal</title>
    <style>
        body {
            background-color: #1e1e2e; /* 背景色（ダークモード風） */
            color: #cdd6f4;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 30px; color: #b4befe; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3列に並べる */
            gap: 20px;
            max-width: 600px;
        }
        .card {
            background-color: #313244;
            padding: 20px 40px;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            color: #cdd6f4;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }
        .card:hover {
            background-color: #45475a;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <h1>Welcome Back</h1>

    <div class="grid">
        <a href="https://www.google.com" class="card">Google</a>
        <a href="https://www.youtube.com" class="card">YouTube</a>
        <a href="https://github.com" class="card">GitHub</a>
        </div>

</body>
</html>
